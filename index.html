<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap & Dodge</title>

<style>
html,body{margin:0;padding:0;overflow:hidden;font-family:Arial;}

#bg{
 position:absolute;
 width:100%;
 height:100%;
 background:url("bg.png") center/cover no-repeat;
 transition:0.3s;
}
#bg.blur{filter:blur(6px) brightness(0.6);}

/* MENU */
#menu{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 z-index:3;
}

.card{
 background:#111;
 padding:25px;
 border-radius:20px;
 text-align:center;
 width:260px;
}

.btn{
 width:200px;
 padding:12px;
 margin:6px;
 border-radius:30px;
 border:none;
}
.main{background:#f59e0b;}
.secondary{
 border:2px solid #f59e0b;
 background:transparent;
 color:#f59e0b;
}

/* MISSIONS */
#missions{
 position:absolute;
 top:10px;
 left:10px;
 color:white;
 font-size:12px;
}

canvas{position:absolute;}
</style>
</head>

<body>

<div id="bg"></div>

<div id="menu">
 <div class="card">
  <button class="btn main" onclick="startGame()">NEW GAME</button>
 </div>
</div>

<div id="missions"></div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

let player,obstacles,score,speed,playing,time;

// MISSIONS
let missions=[];

function generateMissions(){
 missions=[
  {text:"Score 10",type:"score",goal:10,done:false},
  {text:"Survive 20s",type:"time",goal:1200,done:false},
  {text:"Reach speed 6",type:"speed",goal:6,done:false}
 ];
}

function updateMissions(){
 missions.forEach(m=>{
  if(m.done)return;

  if(m.type==="score" && score>=m.goal) m.done=true;
  if(m.type==="time" && time>=m.goal) m.done=true;
  if(m.type==="speed" && speed>=m.goal) m.done=true;
 });

 renderMissions();
}

function renderMissions(){
 document.getElementById("missions").innerHTML=
  missions.map(m=>`
   <div style="color:${m.done?'#22c55e':'#fff'}">
   ${m.done?'✔ ':'• '}${m.text}
   </div>
  `).join("");
}

// PLAYER
class Player{
 constructor(){
  this.x=canvas.width/2;
  this.targetX=this.x;
  this.y=canvas.height-120;
 }
 update(){
  this.x+=(this.targetX-this.x)*0.2;
 }
 draw(){
  ctx.fillStyle="#22c55e";
  ctx.beginPath();
  ctx.arc(this.x,this.y,12,0,Math.PI*2);
  ctx.fill();
 }
 move(){
  this.targetX=this.targetX<canvas.width/2
   ?canvas.width*0.75
   :canvas.width*0.25;
 }
}

// OBSTACLE
class Obstacle{
 constructor(){
  this.gap=130;
  this.x=Math.random()*(canvas.width-this.gap);
  this.y=-30;
 }
 update(){this.y+=speed;}
 draw(){
  let g=ctx.createLinearGradient(0,this.y,0,this.y+20);
  g.addColorStop(0,"#ff7a00");
  g.addColorStop(1,"#ff0055");

  ctx.fillStyle=g;
  ctx.fillRect(0,this.y,this.x,20);
  ctx.fillRect(this.x+this.gap,this.y,
   canvas.width-(this.x+this.gap),20);
 }
}

// START
function startGame(){
 player=new Player();
 obstacles=[];
 score=0;
 speed=4;
 time=0;
 playing=true;

 generateMissions();

 document.getElementById("menu").style.display="none";
 document.getElementById("bg").classList.add("blur");
}

// LOOP
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(playing){
  time++;

  if(time%120==0) speed+=0.5;

  player.update();
  player.draw();

  obstacles.forEach(o=>{
   o.update();
   o.draw();

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.gap){
     playing=false;
     document.getElementById("menu").style.display="flex";
     document.getElementById("bg").classList.remove("blur");
    }
   }

   if(o.y>canvas.height){
    score++;
   }
  });

  obstacles=obstacles.filter(o=>o.y<canvas.height);

  updateMissions();
 }

 requestAnimationFrame(loop);
}

// SPAWN
setInterval(()=>{
 if(playing)obstacles.push(new Obstacle());
},900);

// INPUT
canvas.addEventListener("mousedown",()=>player?.move());
canvas.addEventListener("touchstart",()=>player?.move());

loop();
</script>

</body>
</html>
