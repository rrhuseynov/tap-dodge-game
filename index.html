<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tap Dodge</title>

<!-- cache-bust -->
<link rel="stylesheet" href="./style.css?v=7">
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <img src="assets/welcome.png" class="bg">
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <img src="assets/main_menu.PNG" class="bg">

  <div class="menu-buttons">
    <button id="btnStart">START</button>
    <button id="btnShop">SHOP</button>
  </div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
  <img src="assets/shop.PNG" class="bg">
  <div class="shop-container" id="shopItems"></div>

  <!-- если нет back.png — будет текстовая кнопка -->
  <div class="back-fallback" id="backBtn">BACK</div>
</div>

<!-- GAME (пока пусто, чтобы не ломало) -->
<div id="game" class="screen">
  <img src="assets/game_start.png" class="bg">
  <canvas id="gameCanvas"></canvas>
</div>

<script src="./game.js?v=7"></script>
</body>
</html>
