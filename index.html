<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tap Dodge</title>
<link rel="stylesheet" href="./style.css">
</head>

<body>

<div id="welcome" class="screen active">
  <img src="assets/welcome.png" class="bg">
</div>

<div id="menu" class="screen">
  <img src="assets/main_menu.PNG" class="bg">

  <div class="menu-buttons">
    <button onclick="show('game')">START</button>
    <button onclick="show('shop')">SHOP</button>
  </div>
</div>

<div id="shop" class="screen">
  <img src="assets/shop.PNG" class="bg">
  <div class="shop-container" id="shopItems"></div>
</div>

<div id="game" class="screen">
  <img src="assets/game_start.png" class="bg">
  <canvas id="gameCanvas"></canvas>
</div>

<script src="./game.js"></script>

</body>
</html>
