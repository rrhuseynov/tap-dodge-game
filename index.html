<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Dodge Final</title>

<style>
html, body{
 margin:0;
 padding:0;
 overflow:hidden;
 font-family:Arial;
}

/* 🎮 REAL BACKGROUND */
body{
 background:url("https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1600") no-repeat center;
 background-size:cover;
}

/* 🌫 OVERLAY */
#overlay{
 position:absolute;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.5);
 z-index:0;
}

/* ✨ LIGHT GLOW */
#glow{
 position:absolute;
 width:300px;
 height:300px;
 border-radius:50%;
 background:radial-gradient(circle, rgba(34,197,94,0.3), transparent);
 top:30%;
 left:40%;
 filter:blur(40px);
}

/* 🎮 MENU */
#menu{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 color:white;
 z-index:2;
}

.title{
 font-size:42px;
 color:#22c55e;
 text-shadow:0 0 20px #22c55e;
}

.btn{
 margin-top:20px;
 padding:15px 30px;
 background:#22c55e;
 border:none;
 border-radius:12px;
 font-size:18px;
}

/* TOP UI */
#top{
 position:absolute;
 top:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:10px;
 color:white;
 display:none;
 z-index:3;
}

/* CANVAS */
canvas{
 position:absolute;
 top:0;
 left:0;
 z-index:1;
 background:transparent; /* ВАЖНО */
}
</style>
</head>

<body>

<div id="overlay"></div>
<div id="glow"></div>

<div id="menu">
 <div class="title">TAP DODGE</div>
 <button class="btn" onclick="startGame()">NEW GAME</button>
</div>

<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width = innerWidth;
 canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

// GAME
let player, obstacles=[], score=0, best=0, speed=4, playing=false;

class Player{
 constructor(){
  this.x = canvas.width/2;
  this.targetX = this.x;
  this.y = canvas.height-120;
 }

 update(){
  this.x += (this.targetX-this.x)*0.2;
 }

 draw(){
  ctx.shadowBlur=20;
  ctx.shadowColor="#22c55e";

  ctx.fillStyle="#22c55e";
  ctx.beginPath();
  ctx.arc(this.x,this.y,10,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur=0;
 }

 move(){
  this.targetX = this.targetX < canvas.width/2
   ? canvas.width*0.75
   : canvas.width*0.25;
 }
}

class Obstacle{
 constructor(){
  this.gap=120;
  this.x=Math.random()*(canvas.width-this.gap);
  this.y=-30;
 }

 update(){ this.y+=speed; }

 draw(){
  ctx.fillStyle="#ff4444";
  ctx.fillRect(0,this.y,this.x,20);
  ctx.fillRect(this.x+this.gap,this.y,canvas.width-(this.x+this.gap),20);
 }
}

function startGame(){
 player = new Player();
 obstacles = [];
 score = 0;
 speed = 4;
 playing = true;

 best = localStorage.getItem("best") || 0;

 document.getElementById("menu").style.display="none";
 document.getElementById("top").style.display="flex";
 document.getElementById("score").innerText=score;
 document.getElementById("best").innerText=best;
}

function gameOver(){
 playing=false;

 if(score>best){
  best=score;
  localStorage.setItem("best",best);
 }

 document.getElementById("menu").style.display="flex";
 document.getElementById("top").style.display="none";
}

function loop(){
 // ❗ ВАЖНО: только clear, без fillRect
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(playing){
  player.update();
  player.draw();

  obstacles.forEach(o=>{
   o.update();
   o.draw();

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.gap){
     gameOver();
    }
   }

   if(o.y>canvas.height){
    score++;
    speed+=0.1;
    document.getElementById("score").innerText=score;
   }
  });

  obstacles = obstacles.filter(o=>o.y<canvas.height);
 }

 requestAnimationFrame(loop);
}

setInterval(()=>{
 if(playing) obstacles.push(new Obstacle());
},1000);

canvas.addEventListener("touchstart",()=>player?.move());
canvas.addEventListener("mousedown",()=>player?.move());

loop();
</script>

</body>
</html>
