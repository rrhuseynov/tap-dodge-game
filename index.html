<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Dodge Ultra</title>

<style>
html, body{
 margin:0;
 padding:0;
 overflow:hidden;
 font-family:Arial;
 background:#020617;
}

/* BACKGROUND */
#bg{
 position:absolute;
 width:100%;
 height:100%;
 z-index:0;
}

/* MENU */
#menu{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 z-index:2;
}

.title{
 font-size:48px;
 color:#22c55e;
 text-shadow:0 0 30px #22c55e;
 animation:pulse 2s infinite;
}

@keyframes pulse{
 0%{transform:scale(1);}
 50%{transform:scale(1.05);}
 100%{transform:scale(1);}
}

.btn{
 width:240px;
 padding:16px;
 margin:12px;
 font-size:18px;
 border:none;
 border-radius:14px;
 color:#22c55e;
 background:rgba(34,197,94,0.15);
 border:1px solid rgba(34,197,94,0.5);
 backdrop-filter: blur(10px);
 transition:0.2s;
}

.btn:active{
 transform:scale(0.95);
 background:#22c55e;
 color:#000;
}

/* TOP UI */
#top{
 position:absolute;
 top:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:10px;
 color:#fff;
 display:none;
 z-index:3;
}

canvas#game{
 position:absolute;
 z-index:1;
}

/* FLASH EFFECT */
#flash{
 position:absolute;
 width:100%;
 height:100%;
 background:#fff;
 opacity:0;
 pointer-events:none;
 z-index:5;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="menu">
 <div class="title">TAP DODGE</div>
 <button class="btn" onclick="startGame()">NEW GAME</button>
 <button class="btn" onclick="startCrazy()">CRAZY MODE</button>
 <button class="btn" onclick="toggleSound()">SOUND</button>
</div>

<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<div id="flash"></div>

<canvas id="game"></canvas>

<script>
// ===== RESIZE =====
const bg = document.getElementById("bg");
const bgCtx = bg.getContext("2d");
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
 bg.width = canvas.width = innerWidth;
 bg.height = canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ===== SOUND =====
let sound=true;
let audioCtx=new (window.AudioContext||window.webkitAudioContext)();

function beep(f){
 if(!sound) return;
 let o=audioCtx.createOscillator();
 let g=audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);
 o.frequency.value=f;
 o.start();
 g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.2);
}

function toggleSound(){
 sound=!sound;
}

// ===== BACKGROUND =====
let stars=[];
for(let i=0;i<100;i++){
 stars.push({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  speed:Math.random()*2+0.5
 });
}

function drawBG(){
 bgCtx.fillStyle="#020617";
 bgCtx.fillRect(0,0,bg.width,bg.height);

 stars.forEach(s=>{
  bgCtx.fillStyle="#22c55e";
  bgCtx.fillRect(s.x,s.y,2,2);
  s.y+=s.speed;
  if(s.y>bg.height)s.y=0;
 });

 requestAnimationFrame(drawBG);
}
drawBG();

// ===== GAME =====
let player, obstacles, particles, score, best, speed, playing;

// PLAYER
class Player{
 constructor(){
  this.x=canvas.width/2;
  this.targetX=this.x;
  this.y=canvas.height-120;
  this.trail=[];
 }

 update(){
  this.x+=(this.targetX-this.x)*0.2;
  this.trail.push({x:this.x,y:this.y});
  if(this.trail.length>8) this.trail.shift();
 }

 draw(){
  ctx.strokeStyle="#22c55e";
  ctx.beginPath();
  this.trail.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.stroke();

  ctx.shadowBlur=25;
  ctx.shadowColor="#22c55e";

  ctx.fillStyle="#22c55e";
  ctx.beginPath();
  ctx.arc(this.x,this.y,10,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur=0;
 }

 move(){
  this.targetX = this.targetX < canvas.width/2
   ? canvas.width*0.75
   : canvas.width*0.25;
 }
}

// OBSTACLE
class Obstacle{
 constructor(){
  this.gap=120;
  this.x=Math.random()*(canvas.width-this.gap);
  this.y=-30;
 }

 update(){ this.y+=speed; }

 draw(){
  ctx.shadowBlur=15;
  ctx.shadowColor="#ef4444";
  ctx.fillStyle="#ef4444";
  ctx.fillRect(0,this.y,this.x,20);
  ctx.fillRect(this.x+this.gap,this.y,canvas.width-(this.x+this.gap),20);
  ctx.shadowBlur=0;
 }
}

// EFFECTS
function explode(){
 for(let i=0;i<30;i++){
  particles.push({
   x:player.x,
   y:player.y,
   dx:(Math.random()-0.5)*10,
   dy:(Math.random()-0.5)*10,
   life:30
  });
 }
}

function drawParticles(){
 ctx.fillStyle="#fff";
 particles.forEach(p=>{
  ctx.fillRect(p.x,p.y,2,2);
  p.x+=p.dx;
  p.y+=p.dy;
  p.life--;
 });
 particles=particles.filter(p=>p.life>0);
}

// FLASH
function flash(){
 let f=document.getElementById("flash");
 f.style.opacity=0.8;
 setTimeout(()=>f.style.opacity=0,100);
}

// INIT
function init(){
 player=new Player();
 obstacles=[];
 particles=[];
 score=0;
 speed=4;
 best=localStorage.getItem("best")||0;
 playing=true;

 document.getElementById("score").innerText=score;
 document.getElementById("best").innerText=best;
}

// START
function startGame(){
 init();
 document.getElementById("menu").style.display="none";
 document.getElementById("top").style.display="flex";
}

function startCrazy(){
 init();
 speed=7;
 document.getElementById("menu").style.display="none";
 document.getElementById("top").style.display="flex";
}

// GAME OVER
function gameOver(){
 playing=false;
 explode();
 flash();
 beep(100);
 navigator.vibrate?.(100);

 if(score>best){
  best=score;
  localStorage.setItem("best",best);
 }

 document.getElementById("menu").style.display="flex";
 document.getElementById("top").style.display="none";
}

// LOOP
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(playing){
  player.update();
  player.draw();

  obstacles.forEach(o=>{
   o.update();
   o.draw();

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.gap){
     gameOver();
    }
   }

   if(o.y>canvas.height){
    score++;
    speed+=0.1;
    beep(400);
    document.getElementById("score").innerText=score;
   }
  });

  obstacles=obstacles.filter(o=>o.y<canvas.height);
 }

 drawParticles();
 requestAnimationFrame(loop);
}

// SPAWN
setInterval(()=>{
 if(playing) obstacles.push(new Obstacle());
},900);

// INPUT
canvas.addEventListener("touchstart",()=>player?.move());
canvas.addEventListener("mousedown",()=>player?.move());

loop();
</script>

</body>
</html>
