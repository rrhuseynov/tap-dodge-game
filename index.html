<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap & Dodge</title>

<style>
html, body{
 margin:0;
 padding:0;
 overflow:hidden;
 font-family:Arial;
}

/* BACKGROUND */
#bg{
 position:absolute;
 width:100%;
 height:100%;
 background:url("bg.png") center/cover no-repeat;
}

#overlay{
 position:absolute;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.6);
}

/* MENU */
#menu{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 z-index:3;
}

.card{
 background:#0b0b0b;
 padding:30px;
 border-radius:20px;
 text-align:center;
 width:260px;
}

.btn{
 width:200px;
 padding:14px;
 margin:8px 0;
 border:none;
 border-radius:30px;
 background:#f59e0b;
}

/* GAME OVER */
#gameOver{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 color:white;
 z-index:4;
 display:none;
}

#gameOver h1{
 font-size:50px;
 color:#ff4444;
}

.tap{
 margin-top:10px;
 color:#ccc;
}

/* TOP */
#top{
 position:absolute;
 top:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:10px;
 color:white;
 display:none;
 z-index:4;
}

canvas{
 position:absolute;
 z-index:2;
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="overlay"></div>

<!-- MENU -->
<div id="menu">
 <div class="card">
  <button class="btn" onclick="newGame()">NEW GAME</button>
 </div>
</div>

<!-- GAME OVER -->
<div id="gameOver">
 <h1>GAME OVER</h1>
 <div class="tap">Tap to restart</div>
</div>

<!-- TOP -->
<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width = innerWidth;
 canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

let player, obstacles=[], score=0, best=0, speed=4;
let playing=false;
let gameOverState=false;

// PLAYER
class Player{
 constructor(){
  this.x = canvas.width/2;
  this.targetX = this.x;
  this.y = canvas.height-120;
 }

 update(){
  this.x += (this.targetX-this.x)*0.2;
 }

 draw(){
  ctx.fillStyle="#22c55e";
  ctx.beginPath();
  ctx.arc(this.x,this.y,12,0,Math.PI*2);
  ctx.fill();
 }

 move(){
  this.targetX = this.targetX < canvas.width/2
   ? canvas.width*0.75
   : canvas.width*0.25;
 }
}

// OBSTACLE
class Obstacle{
 constructor(){
  this.gap=130;
  this.x=Math.random()*(canvas.width-this.gap);
  this.y=-30;
 }

 update(){ this.y+=speed; }

 draw(){
  let h=20;

  let g = ctx.createLinearGradient(0,this.y,0,this.y+h);
  g.addColorStop(0,"#ff7a00");
  g.addColorStop(1,"#ff0055");

  ctx.fillStyle=g;
  ctx.fillRect(0,this.y,this.x,h);
  ctx.fillRect(this.x+this.gap,this.y,
   canvas.width-(this.x+this.gap),h);
 }
}

function newGame(){
 player=new Player();
 obstacles=[];
 score=0;
 speed=4;
 playing=true;
 gameOverState=false;

 document.getElementById("menu").style.display="none";
 document.getElementById("overlay").style.display="none";
 document.getElementById("top").style.display="flex";
 document.getElementById("gameOver").style.display="none";
}

function triggerGameOver(){
 playing=false;
 gameOverState=true;

 document.getElementById("gameOver").style.display="flex";

 if(score>best){
  best=score;
  localStorage.setItem("best",best);
 }
}

function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(playing){
  player.update();
  player.draw();

  obstacles.forEach(o=>{
   o.update();
   o.draw();

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.gap){
     triggerGameOver();
    }
   }

   if(o.y>canvas.height){
    score++;
    speed+=0.1;
    document.getElementById("score").innerText=score;
   }
  });

  obstacles = obstacles.filter(o=>o.y<canvas.height);
 }

 requestAnimationFrame(loop);
}

setInterval(()=>{
 if(playing) obstacles.push(new Obstacle());
},900);

// INPUT
canvas.addEventListener("mousedown",handleInput);
canvas.addEventListener("touchstart",handleInput);

function handleInput(){
 if(gameOverState){
  newGame();
 }else if(playing){
  player.move();
 }
}

loop();
</script>

</body>
</html>
