<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Dodge Pro</title>

<style>
html, body{
 margin:0;
 padding:0;
 overflow:hidden;
 font-family:Arial;
}

/* BACKGROUND */
#bg{
 position:absolute;
 width:100%;
 height:100%;
 z-index:0;
}

/* MENU */
#menu{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 z-index:2;
}

.title{
 font-size:48px;
 color:#22c55e;
 text-shadow:0 0 30px #22c55e;
 margin-bottom:30px;
}

.btn{
 width:220px;
 padding:15px;
 margin:10px;
 font-size:18px;
 border:none;
 border-radius:14px;
 color:#22c55e;
 background:rgba(34,197,94,0.2);
 border:1px solid #22c55e;
 backdrop-filter: blur(10px);
}

/* GAME UI */
#top{
 position:absolute;
 top:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:10px;
 color:#fff;
 display:none;
 z-index:3;
}

canvas#game{
 position:absolute;
 z-index:1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="menu">
 <div class="title">TAP DODGE</div>
 <button class="btn" onclick="startGame()">NEW GAME</button>
</div>

<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<canvas id="game"></canvas>

<script>
// ===== CANVAS =====
const bg = document.getElementById("bg");
const bgCtx = bg.getContext("2d");
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
 bg.width = canvas.width = innerWidth;
 bg.height = canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ===== BEAUTIFUL BACKGROUND =====
let circles=[];
for(let i=0;i<6;i++){
 circles.push({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  r:Math.random()*200+100,
  dx:(Math.random()-0.5)*0.5,
  dy:(Math.random()-0.5)*0.5
 });
}

function drawBG(){
 bgCtx.fillStyle="#020617";
 bgCtx.fillRect(0,0,bg.width,bg.height);

 circles.forEach(c=>{
  let g = bgCtx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r);
  g.addColorStop(0,"rgba(34,197,94,0.2)");
  g.addColorStop(1,"transparent");

  bgCtx.fillStyle=g;
  bgCtx.beginPath();
  bgCtx.arc(c.x,c.y,c.r,0,Math.PI*2);
  bgCtx.fill();

  c.x+=c.dx;
  c.y+=c.dy;

  if(c.x<0||c.x>bg.width) c.dx*=-1;
  if(c.y<0||c.y>bg.height) c.dy*=-1;
 });

 requestAnimationFrame(drawBG);
}
drawBG();

// ===== GAME =====
let player, obstacles=[], score=0, best=0, speed=4, playing=false;

// PLAYER
class Player{
 constructor(){
  this.x = canvas.width/2;
  this.targetX = this.x;
  this.y = canvas.height-120;
 }

 update(){
  this.x += (this.targetX-this.x)*0.2;
 }

 draw(){
  ctx.shadowBlur=20;
  ctx.shadowColor="#22c55e";

  ctx.fillStyle="#22c55e";
  ctx.beginPath();
  ctx.arc(this.x,this.y,10,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur=0;
 }

 move(){
  this.targetX = this.targetX < canvas.width/2
   ? canvas.width*0.75
   : canvas.width*0.25;
 }
}

// OBSTACLE
class Obstacle{
 constructor(){
  this.gap=120;
  this.x=Math.random()*(canvas.width-this.gap);
  this.y=-30;
 }

 update(){ this.y+=speed; }

 draw(){
  ctx.fillStyle="#ef4444";
  ctx.fillRect(0,this.y,this.x,20);
  ctx.fillRect(this.x+this.gap,this.y,canvas.width-(this.x+this.gap),20);
 }
}

// START GAME
function startGame(){
 player = new Player();
 obstacles = [];
 score = 0;
 speed = 4;
 playing = true;

 best = localStorage.getItem("best") || 0;

 document.getElementById("menu").style.display="none";
 document.getElementById("top").style.display="flex";
 document.getElementById("score").innerText=score;
 document.getElementById("best").innerText=best;
}

// GAME OVER
function gameOver(){
 playing=false;

 if(score>best){
  best=score;
  localStorage.setItem("best",best);
 }

 document.getElementById("menu").style.display="flex";
 document.getElementById("top").style.display="none";
}

// LOOP
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(playing){
  player.update();
  player.draw();

  obstacles.forEach(o=>{
   o.update();
   o.draw();

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.gap){
     gameOver();
    }
   }

   if(o.y>canvas.height){
    score++;
    speed+=0.1;
    document.getElementById("score").innerText=score;
   }
  });

  obstacles = obstacles.filter(o=>o.y<canvas.height);
 }

 requestAnimationFrame(loop);
}

// SPAWN
setInterval(()=>{
 if(playing) obstacles.push(new Obstacle());
},1000);

// INPUT
canvas.addEventListener("touchstart",()=>player?.move());
canvas.addEventListener("mousedown",()=>player?.move());

loop();
</script>

</body>
</html>
