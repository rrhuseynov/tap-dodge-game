<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap & Dodge</title>

<style>
html, body{
 margin:0;
 padding:0;
 overflow:hidden;
 font-family:Arial;
}

/* BACKGROUND */
#bg{
 position:absolute;
 width:100%;
 height:100%;
 background:url("bg.png") center/cover no-repeat;
}

/* DARK OVERLAY */
#overlay{
 position:absolute;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.6);
}

/* MENU */
#menu{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 z-index:2;
}

/* CARD */
.card{
 background:#0b0b0b;
 padding:30px;
 border-radius:20px;
 text-align:center;
 box-shadow:0 0 30px rgba(255,165,0,0.2);
 width:260px;
}

/* TITLE */
.card h1{
 color:#fff;
 margin-bottom:10px;
}

/* SUBTITLE */
.subtitle{
 color:#f59e0b;
 font-size:14px;
 margin-bottom:20px;
}

/* MAIN BUTTON */
.main-btn{
 width:200px;
 padding:15px;
 margin:10px 0;
 border:none;
 border-radius:30px;
 background:#f59e0b;
 color:#000;
 font-weight:bold;
 font-size:16px;
}

/* SECOND BUTTON */
.secondary-btn{
 width:200px;
 padding:12px;
 border:2px solid #f59e0b;
 border-radius:30px;
 background:transparent;
 color:#f59e0b;
 font-size:14px;
}

/* TOP UI */
#top{
 position:absolute;
 top:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:10px;
 color:white;
 display:none;
 z-index:3;
}

/* CANVAS */
canvas{
 position:absolute;
 z-index:1;
 background:transparent;
}
</style>
</head>

<body>

<div id="bg"></div>
<div id="overlay"></div>

<!-- MENU -->
<div id="menu">
  <div class="card">
    <h1>TAP & DODGE</h1>
    <p class="subtitle">Dodge obstacles and survive!</p>

    <button class="main-btn" onclick="startGame()">
      START GAME
    </button>

    <button class="secondary-btn">
      🏆 Leaderboard
    </button>
  </div>
</div>

<!-- TOP -->
<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width = innerWidth;
 canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

// GAME
let player, obstacles=[], score=0, best=0, speed=4, playing=false;

// PLAYER
class Player{
 constructor(){
  this.x = canvas.width/2;
  this.targetX = this.x;
  this.y = canvas.height-120;
 }

 update(){
  this.x += (this.targetX-this.x)*0.2;
 }

 draw(){
  ctx.shadowBlur=20;
  ctx.shadowColor="#22c55e";

  ctx.fillStyle="#22c55e";
  ctx.beginPath();
  ctx.arc(this.x,this.y,10,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur=0;
 }

 move(){
  this.targetX = this.targetX < canvas.width/2
   ? canvas.width*0.75
   : canvas.width*0.25;
 }
}

// OBSTACLE
class Obstacle{
 constructor(){
  this.gap=120;
  this.x=Math.random()*(canvas.width-this.gap);
  this.y=-30;
 }

 update(){ this.y+=speed; }

 draw(){
  ctx.fillStyle="#ff0044";
  ctx.fillRect(0,this.y,this.x,20);
  ctx.fillRect(this.x+this.gap,this.y,canvas.width-(this.x+this.gap),20);
 }
}

// START
function startGame(){
 player = new Player();
 obstacles = [];
 score = 0;
 speed = 4;
 playing = true;

 best = localStorage.getItem("best") || 0;

 document.getElementById("overlay").style.display="none";
 document.getElementById("menu").style.display="none";
 document.getElementById("top").style.display="flex";
}

// GAME OVER
function gameOver(){
 playing=false;

 document.getElementById("overlay").style.display="block";

 if(score>best){
  best=score;
  localStorage.setItem("best",best);
 }

 document.getElementById("menu").style.display="flex";
 document.getElementById("top").style.display="none";
}

// LOOP
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(playing){
  player.update();
  player.draw();

  obstacles.forEach(o=>{
   o.update();
   o.draw();

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.gap){
     gameOver();
    }
   }

   if(o.y>canvas.height){
    score++;
    speed+=0.1;
    document.getElementById("score").innerText=score;
   }
  });

  obstacles = obstacles.filter(o=>o.y<canvas.height);
 }

 requestAnimationFrame(loop);
}

// SPAWN
setInterval(()=>{
 if(playing) obstacles.push(new Obstacle());
},1000);

// INPUT
canvas.addEventListener("mousedown",()=>player?.move());
canvas.addEventListener("touchstart",()=>player?.move());

loop();
</script>

</body>
</html>
