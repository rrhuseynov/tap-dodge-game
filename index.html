<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tap Dodge Pro</title>

<style>
html, body{
 margin:0;
 padding:0;
 background:#020617;
 color:#fff;
 font-family:Arial;
 overflow:hidden;
 text-align:center;
}

#top{
 display:flex;
 justify-content:space-between;
 padding:12px 15px;
 font-size:18px;
}

#menu{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%, -50%);
 font-size:26px;
 color:#22c55e;
 text-shadow:0 0 10px #22c55e;
}

canvas{
 display:block;
 margin:auto;
 background:#000;
 border-radius:12px;
 width:90vw;
 max-width:350px;
}
</style>
</head>

<body>

<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<div id="menu">TAP TO START</div>

<canvas id="game" width="300" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq){
 let o = audioCtx.createOscillator();
 let g = audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);
 o.frequency.value = freq;
 o.start();
 g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
}

// PLAYER
let player = { x:150, targetX:150, y:400 };

// STATE
let obstacles = [];
let particles = [];
let score = 0;
let best = localStorage.getItem("dodgeBest") || 0;
let speed = 4;
let playing = false;

document.getElementById("best").innerText = best;

// SPAWN
function spawn(){
 let gap = 80;
 let x = Math.random()*(300-gap);
 obstacles.push({ x, width:gap, y:-20 });
}

// PLAYER DRAW
function drawPlayer(){
 player.x += (player.targetX - player.x)*0.25;

 ctx.shadowBlur = 15;
 ctx.shadowColor = "#22c55e";

 ctx.fillStyle = "#22c55e";
 ctx.beginPath();
 ctx.arc(player.x, player.y, 10, 0, Math.PI*2);
 ctx.fill();

 ctx.shadowBlur = 0;
}

// OBSTACLES
function drawObstacles(){
 ctx.fillStyle = "#ef4444";
 obstacles.forEach(o=>{
  ctx.fillRect(0,o.y,o.x,20);
  ctx.fillRect(o.x+o.width,o.y,300-(o.x+o.width),20);
 });
}

// PARTICLES
function spawnParticles(){
 for(let i=0;i<20;i++){
  particles.push({
   x:player.x,
   y:player.y,
   dx:(Math.random()-0.5)*6,
   dy:(Math.random()-0.5)*6,
   life:30
  });
 }
}

function drawParticles(){
 ctx.fillStyle="#fff";
 particles.forEach(p=>{
  ctx.fillRect(p.x,p.y,2,2);
  p.x+=p.dx;
  p.y+=p.dy;
  p.life--;
 });
 particles = particles.filter(p=>p.life>0);
}

// GAME OVER
function gameOver(){
 playing = false;
 beep(120);
 navigator.vibrate?.(100);

 spawnParticles();

 if(score>best){
  best=score;
  localStorage.setItem("dodgeBest",best);
 }

 document.getElementById("menu").innerText="GAME OVER\nTAP TO RESTART";
 document.getElementById("menu").style.display="block";
}

// UPDATE
function update(){
 ctx.clearRect(0,0,300,500);

 drawPlayer();
 drawObstacles();
 drawParticles();

 if(playing){
  obstacles.forEach(o=>{
   o.y += speed;

   if(player.y < o.y+20 && player.y > o.y){
    if(player.x < o.x || player.x > o.x+o.width){
     gameOver();
    }
   }

   if(o.y > 500){
    score++;
    speed += 0.1;
    beep(400);
    document.getElementById("score").innerText=score;
   }
  });

  obstacles = obstacles.filter(o=>o.y<500);
 }

 requestAnimationFrame(update);
}

// TAP
function tap(){
 if(!playing){
  startGame();
  return;
 }

 player.targetX = player.targetX===80 ? 220 : 80;
 beep(800);
}

// START
function startGame(){
 playing = true;
 score = 0;
 speed = 4;
 obstacles = [];
 particles = [];

 player.x = 150;
 player.targetX = 150;

 document.getElementById("score").innerText = score;
 document.getElementById("menu").style.display = "none";
}

// EVENTS
canvas.addEventListener("touchstart", tap);
canvas.addEventListener("mousedown", tap);

// SPAWN LOOP
setInterval(()=>{ if(playing) spawn(); }, 900);

update();
</script>

</body>
</html>
