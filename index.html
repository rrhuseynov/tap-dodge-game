<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>Tap Dodge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="welcome" class="screen active">
  <img src="assets/welcome.png" class="bg">
</div>

<div id="menu" class="screen">
  <img src="assets/main_menu.png" class="bg" onclick="menuClick(event)">
</div>

<div id="game_start" class="screen">
  <img src="assets/game_start.png" class="bg" onclick="startFromTap()">
</div>

<div id="game" class="screen">
  <img src="assets/game.png" class="bg">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="shop" class="screen">
  <img src="assets/shop.png" class="bg" onclick="backMenu()">
</div>

<div id="appearance_ball" class="screen">
  <img src="assets/appearance-ball.png" class="bg" onclick="backMenu()">
</div>

<div id="leaderboard" class="screen">
  <img src="assets/leaderboard.png" class="bg" onclick="backMenu()">
</div>

<script src="game.js"></script>
</body>
</html>
