<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Dodge</title>

<style>
html, body{
 margin:0;
 padding:0;
 overflow:hidden;
 font-family:Arial;
 background:#020617;
 color:#fff;
}

/* BACKGROUND CANVAS */
#bg{
 position:absolute;
 top:0;
 left:0;
 z-index:0;
}

/* MENU */
#menu{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 z-index:2;
}

.title{
 font-size:42px;
 margin-bottom:30px;
 color:#22c55e;
 text-shadow:0 0 20px #22c55e;
}

.btn{
 width:220px;
 padding:15px;
 margin:10px;
 font-size:18px;
 border:none;
 border-radius:12px;
 background:rgba(34,197,94,0.2);
 color:#22c55e;
 backdrop-filter: blur(10px);
 border:1px solid #22c55e;
}

.btn:hover{
 background:#22c55e;
 color:#000;
}

/* GAME UI */
#top{
 position:absolute;
 top:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:10px;
 display:none;
 z-index:3;
}

canvas#game{
 position:absolute;
 top:0;
 left:0;
 z-index:1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="menu">
 <div class="title">TAP DODGE</div>
 <button class="btn" onclick="startGame()">NEW GAME</button>
 <button class="btn" onclick="startCrazy()">CRAZY MODE</button>
 <button class="btn" onclick="showBest()">LEADERBOARD</button>
</div>

<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<canvas id="game"></canvas>

<script>
// ===== BACKGROUND ANIMATION =====
const bg = document.getElementById("bg");
const bgCtx = bg.getContext("2d");

function resizeAll(){
 bg.width = innerWidth;
 bg.height = innerHeight;
 canvas.width = innerWidth;
 canvas.height = innerHeight;
}
window.addEventListener("resize", resizeAll);

// stars
let stars=[];
for(let i=0;i<80;i++){
 stars.push({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  speed:Math.random()*1+0.5
 });
}

function drawBG(){
 bgCtx.fillStyle="#020617";
 bgCtx.fillRect(0,0,bg.width,bg.height);

 bgCtx.fillStyle="#22c55e";
 stars.forEach(s=>{
  bgCtx.fillRect(s.x,s.y,2,2);
  s.y+=s.speed;
  if(s.y>bg.height)s.y=0;
 });

 requestAnimationFrame(drawBG);
}
drawBG();

// ===== GAME =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, obstacles, score, best, speed, playing;

// PLAYER
class Player{
 constructor(){
  this.x = canvas.width/2;
  this.targetX = this.x;
  this.y = canvas.height-120;
 }

 update(){
  this.x += (this.targetX-this.x)*0.2;
 }

 draw(){
  ctx.shadowBlur=20;
  ctx.shadowColor="#22c55e";

  ctx.fillStyle="#22c55e";
  ctx.beginPath();
  ctx.arc(this.x,this.y,10,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur=0;
 }

 move(){
  this.targetX = this.targetX < canvas.width/2
   ? canvas.width*0.75
   : canvas.width*0.25;
 }
}

// OBSTACLE
class Obstacle{
 constructor(){
  this.gap=120;
  this.x=Math.random()*(canvas.width-this.gap);
  this.y=-30;
 }

 update(){
  this.y+=speed;
 }

 draw(){
  ctx.fillStyle="#ef4444";
  ctx.fillRect(0,this.y,this.x,20);
  ctx.fillRect(this.x+this.gap,this.y,canvas.width-(this.x+this.gap),20);
 }
}

// INIT
function init(){
 player=new Player();
 obstacles=[];
 score=0;
 best=localStorage.getItem("best")||0;
 speed=4;
 playing=true;

 document.getElementById("score").innerText=score;
 document.getElementById("best").innerText=best;
}

// START MODES
function startGame(){
 init();
 speed=4;
 startUI();
}

function startCrazy(){
 init();
 speed=7; // быстрее
 startUI();
}

function startUI(){
 document.getElementById("menu").style.display="none";
 document.getElementById("top").style.display="flex";
}

// LEADERBOARD
function showBest(){
 alert("BEST SCORE: " + (localStorage.getItem("best")||0));
}

// GAME OVER
function gameOver(){
 playing=false;

 if(score>best){
  best=score;
  localStorage.setItem("best",best);
 }

 document.getElementById("menu").style.display="flex";
 document.getElementById("top").style.display="none";
}

// LOOP
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(playing){
  player.update();
  player.draw();

  obstacles.forEach(o=>{
   o.update();
   o.draw();

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.gap){
     gameOver();
    }
   }

   if(o.y>canvas.height){
    score++;
    speed+=0.1;
    document.getElementById("score").innerText=score;
   }
  });

  obstacles=obstacles.filter(o=>o.y<canvas.height);
 }

 requestAnimationFrame(loop);
}

// SPAWN
setInterval(()=>{
 if(playing) obstacles.push(new Obstacle());
},1000);

// INPUT
canvas.addEventListener("touchstart",()=>player?.move());
canvas.addEventListener("mousedown",()=>player?.move());

// START
resizeAll();
loop();
</script>

</body>
</html>
