<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Dodge</title>

<style>
html, body{
 margin:0;
 padding:0;
 overflow:hidden;
 font-family:Arial;
 background:#020617;
}

/* LOADING */
#loading{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 color:#22c55e;
 font-size:28px;
 background:#020617;
 z-index:10;
}

/* MENU */
#menu{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 color:#fff;
 z-index:5;
 display:none;
}

.title{
 font-size:40px;
 color:#22c55e;
 text-shadow:0 0 20px #22c55e;
 margin-bottom:40px;
}

.btn{
 padding:15px 40px;
 font-size:20px;
 border:none;
 border-radius:10px;
 background:#22c55e;
 color:#000;
 margin:10px;
}

/* TOP UI */
#top{
 position:absolute;
 top:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:10px;
 color:#fff;
 display:none;
 z-index:3;
}

canvas{
 position:absolute;
 top:0;
 left:0;
}
</style>
</head>

<body>

<div id="loading">Loading...</div>

<div id="menu">
 <div class="title">TAP DODGE</div>
 <button class="btn" onclick="startGame()">PLAY</button>
 <button class="btn" onclick="toggleSound()">SOUND</button>
</div>

<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// LOADING → MENU
setTimeout(()=>{
 document.getElementById("loading").style.display="none";
 document.getElementById("menu").style.display="flex";
},1500);

// SOUND
let sound = true;
function toggleSound(){
 sound = !sound;
}

// STARS
let stars=[];
for(let i=0;i<60;i++){
 stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

// PLAYER
let player={x:0,targetX:0,y:0};

// STATE
let obstacles=[];
let score=0;
let best=localStorage.getItem("best")||0;
let speed=4;
let playing=false;

document.getElementById("best").innerText=best;

function resetPlayer(){
 player.x=canvas.width/2;
 player.targetX=canvas.width/2;
 player.y=canvas.height-120;
}

// SPAWN
function spawn(){
 let gap=120;
 let x=Math.random()*(canvas.width-gap);
 obstacles.push({x,width:gap,y:-30});
}

// DRAW
function drawStars(){
 ctx.fillStyle="#fff";
 stars.forEach(s=>{
  ctx.fillRect(s.x,s.y,2,2);
  s.y+=1;
  if(s.y>canvas.height)s.y=0;
 });
}

function drawPlayer(){
 player.x += (player.targetX-player.x)*0.2;

 ctx.fillStyle="#22c55e";
 ctx.beginPath();
 ctx.arc(player.x,player.y,10,0,Math.PI*2);
 ctx.fill();
}

function drawObstacles(){
 ctx.fillStyle="#ef4444";
 obstacles.forEach(o=>{
  ctx.fillRect(0,o.y,o.x,20);
  ctx.fillRect(o.x+o.width,o.y,canvas.width-(o.x+o.width),20);
 });
}

// GAME OVER
function gameOver(){
 playing=false;

 if(score>best){
  best=score;
  localStorage.setItem("best",best);
 }

 document.getElementById("menu").style.display="flex";
 document.getElementById("top").style.display="none";
}

// UPDATE
function update(){
 ctx.fillStyle="rgba(2,6,23,0.4)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 drawStars();
 drawPlayer();
 drawObstacles();

 if(playing){
  obstacles.forEach(o=>{
   o.y+=speed;

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.width){
     gameOver();
    }
   }

   if(o.y>canvas.height){
    score++;
    speed+=0.1;
    document.getElementById("score").innerText=score;
   }
  });

  obstacles=obstacles.filter(o=>o.y<canvas.height);
 }

 requestAnimationFrame(update);
}

// TAP
canvas.addEventListener("touchstart",tap);
canvas.addEventListener("mousedown",tap);

function tap(){
 if(!playing) return;

 player.targetX = player.targetX < canvas.width/2
  ? canvas.width*0.75
  : canvas.width*0.25;
}

// START
function startGame(){
 playing=true;
 score=0;
 speed=4;
 obstacles=[];

 resetPlayer();

 document.getElementById("menu").style.display="none";
 document.getElementById("top").style.display="flex";
 document.getElementById("score").innerText=score;
}

// LOOP
setInterval(()=>{ if(playing) spawn(); },1000);

resetPlayer();
update();
</script>

</body>
</html>
