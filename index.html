<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Dodge Pro</title>

<style>
html, body{
 margin:0;
 padding:0;
 overflow:hidden;
 font-family:Arial;
}

/* BACKGROUND */
body{
 background:url("https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1600") no-repeat center;
 background-size:cover;
}

#overlay{
 position:absolute;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.5);
}

/* MENU */
#menu{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 color:white;
}

.title{
 font-size:40px;
 color:#22c55e;
 text-shadow:0 0 20px #22c55e;
}

.btn{
 margin-top:20px;
 padding:15px 30px;
 border:none;
 border-radius:12px;
 background:#22c55e;
 font-size:18px;
 transition:0.2s;
}

.btn:active{
 transform:scale(0.9);
}

/* UI */
#top{
 position:absolute;
 top:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:10px;
 color:white;
 display:none;
}

#flash{
 position:absolute;
 width:100%;
 height:100%;
 background:white;
 opacity:0;
 pointer-events:none;
}

canvas{
 position:absolute;
}
</style>
</head>

<body>

<div id="overlay"></div>

<div id="menu">
 <div class="title">TAP DODGE</div>
 <button class="btn" onclick="startGame()">NEW GAME</button>
</div>

<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<div id="flash"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width = innerWidth;
 canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

// SOUND
let audioCtx = new (window.AudioContext||window.webkitAudioContext)();

function beep(f){
 let o = audioCtx.createOscillator();
 let g = audioCtx.createGain();
 o.connect(g); g.connect(audioCtx.destination);
 o.frequency.value = f;
 o.start();
 g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.2);
}

// GAME
let player, obstacles=[], particles=[], score=0, best=0, speed=4, playing=false;

class Player{
 constructor(){
  this.x = canvas.width/2;
  this.targetX = this.x;
  this.y = canvas.height-120;
 }

 update(){
  this.x += (this.targetX-this.x)*0.2;
 }

 draw(){
  ctx.shadowBlur=20;
  ctx.shadowColor="#22c55e";

  ctx.fillStyle="#22c55e";
  ctx.beginPath();
  ctx.arc(this.x,this.y,10,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur=0;
 }

 move(){
  this.targetX = this.targetX < canvas.width/2
   ? canvas.width*0.75
   : canvas.width*0.25;
 }
}

class Obstacle{
 constructor(){
  this.gap=120;
  this.x=Math.random()*(canvas.width-this.gap);
  this.y=-30;
 }

 update(){ this.y+=speed; }

 draw(){
  ctx.fillStyle="#ff4444";
  ctx.fillRect(0,this.y,this.x,20);
  ctx.fillRect(this.x+this.gap,this.y,canvas.width-(this.x+this.gap),20);
 }
}

function explode(){
 for(let i=0;i<20;i++){
  particles.push({
   x:player.x,
   y:player.y,
   dx:(Math.random()-0.5)*8,
   dy:(Math.random()-0.5)*8,
   life:30
  });
 }
}

function drawParticles(){
 ctx.fillStyle="#fff";
 particles.forEach(p=>{
  ctx.fillRect(p.x,p.y,2,2);
  p.x+=p.dx;
  p.y+=p.dy;
  p.life--;
 });
 particles=particles.filter(p=>p.life>0);
}

function flash(){
 let f=document.getElementById("flash");
 f.style.opacity=0.8;
 setTimeout(()=>f.style.opacity=0,100);
}

function startGame(){
 player = new Player();
 obstacles = [];
 particles=[];
 score = 0;
 speed = 4;
 playing = true;

 best = localStorage.getItem("best") || 0;

 document.getElementById("menu").style.display="none";
 document.getElementById("top").style.display="flex";
 document.getElementById("score").innerText=score;
 document.getElementById("best").innerText=best;
}

function gameOver(){
 playing=false;
 beep(120);
 navigator.vibrate?.(100);
 explode();
 flash();

 if(score>best){
  best=score;
  localStorage.setItem("best",best);
 }

 document.getElementById("menu").style.display="flex";
 document.getElementById("top").style.display="none";
}

function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(playing){
  player.update();
  player.draw();

  obstacles.forEach(o=>{
   o.update();
   o.draw();

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.gap){
     gameOver();
    }
   }

   if(o.y>canvas.height){
    score++;
    speed+=0.1;
    beep(400);
    document.getElementById("score").innerText=score;
   }
  });

  obstacles = obstacles.filter(o=>o.y<canvas.height);
 }

 drawParticles();
 requestAnimationFrame(loop);
}

setInterval(()=>{
 if(playing) obstacles.push(new Obstacle());
},900);

canvas.addEventListener("touchstart",()=>player?.move());
canvas.addEventListener("mousedown",()=>player?.move());

loop();
</script>

</body>
</html>
