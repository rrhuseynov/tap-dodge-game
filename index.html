<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tap Dodge</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <img src="assets/welcome.png" class="bg">
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <img src="assets/main_menu.PNG" class="bg">

  <div class="menu-buttons">
    <img src="assets/start.png" id="startBtn" class="menu-img-btn">
    <img src="assets/shop.png" id="shopBtn" class="menu-img-btn">
    <img src="assets/appearance.png" class="menu-img-btn">
    <img src="assets/leaderboard.png" class="menu-img-btn">
  </div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
  <img src="assets/shop.PNG" class="bg">

  <div id="shopItems" class="shop-container"></div>

  <div id="backBtn" class="back-btn">BACK</div>
</div>

<script src="game.js"></script>

</body>
</html>
