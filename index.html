<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap & Dodge</title>

<style>
html,body{
 margin:0;
 padding:0;
 overflow:hidden;
 font-family:Arial;
}

/* BACKGROUND */
#bg{
 position:absolute;
 width:100%;
 height:100%;
 background:url("bg.png") center/cover no-repeat;
 transition:0.3s;
}

#bg.blur{
 filter:blur(6px) brightness(0.6);
}

/* MENU */
#menu{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 z-index:3;
}

.card{
 background:#111;
 padding:30px;
 border-radius:20px;
 text-align:center;
 width:260px;
}

.btn{
 width:200px;
 padding:14px;
 margin:8px 0;
 border:none;
 border-radius:30px;
 font-size:15px;
}

.main{background:#f59e0b;}
.secondary{
 background:transparent;
 border:2px solid #f59e0b;
 color:#f59e0b;
}

/* LEADERBOARD */
#leaderboard{
 position:absolute;
 width:100%;
 height:100%;
 display:none;
 justify-content:center;
 align-items:center;
 color:white;
 z-index:4;
}

.board{
 background:#000;
 padding:20px;
 border-radius:20px;
}

/* GAME OVER */
#gameOver{
 position:absolute;
 width:100%;
 height:100%;
 display:none;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 color:white;
 z-index:4;
}

canvas{position:absolute;}
</style>
</head>

<body>

<div id="bg"></div>

<!-- MENU -->
<div id="menu">
 <div class="card">
  <button class="btn main" onclick="startGame()">NEW GAME</button>
  <button class="btn secondary" onclick="showLeaderboard()">LEADERBOARD</button>
 </div>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard">
 <div class="board">
  <h2>Top Scores</h2>
  <div id="scores"></div>
  <button onclick="closeBoard()">Back</button>
 </div>
</div>

<!-- GAME OVER -->
<div id="gameOver">
 <h1>GAME OVER</h1>
 <p>Tap to restart</p>
</div>

<canvas id="game"></canvas>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
 canvas.width=innerWidth;
 canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

let player,obstacles,score,speed,playing,gameOverState,time=0;

// PLAYER
class Player{
 constructor(){
  this.x=canvas.width/2;
  this.targetX=this.x;
  this.y=canvas.height-120;
 }

 update(){
  this.x+=(this.targetX-this.x)*0.2;
 }

 draw(){
  ctx.fillStyle="#22c55e";
  ctx.beginPath();
  ctx.arc(this.x,this.y,12,0,Math.PI*2);
  ctx.fill();
 }

 move(){
  this.targetX=this.targetX<canvas.width/2
   ?canvas.width*0.75
   :canvas.width*0.25;
 }
}

// OBSTACLE
class Obstacle{
 constructor(){
  this.gap=130;
  this.x=Math.random()*(canvas.width-this.gap);
  this.y=-30;
 }

 update(){this.y+=speed;}

 draw(){
  let g=ctx.createLinearGradient(0,this.y,0,this.y+20);
  g.addColorStop(0,"#ff7a00");
  g.addColorStop(1,"#ff0055");

  ctx.fillStyle=g;
  ctx.fillRect(0,this.y,this.x,20);
  ctx.fillRect(this.x+this.gap,this.y,
   canvas.width-(this.x+this.gap),20);
 }
}

// START
function startGame(){
 player=new Player();
 obstacles=[];
 score=0;
 speed=4;
 time=0;
 playing=true;
 gameOverState=false;

 document.getElementById("menu").style.display="none";
 document.getElementById("bg").classList.add("blur");
}

// GAME OVER
function triggerGameOver(){
 playing=false;
 gameOverState=true;

 saveScore();

 document.getElementById("gameOver").style.display="flex";
}

// SAVE SCORE
function saveScore(){
 let scores=JSON.parse(localStorage.getItem("scores")||"[]");
 scores.push(score);
 scores.sort((a,b)=>b-a);
 scores=scores.slice(0,5);
 localStorage.setItem("scores",JSON.stringify(scores));
}

// LEADERBOARD
function showLeaderboard(){
 document.getElementById("leaderboard").style.display="flex";

 let scores=JSON.parse(localStorage.getItem("scores")||"[]");
 document.getElementById("scores").innerHTML =
  scores.map(s=>"<div>"+s+"</div>").join("");
}

function closeBoard(){
 document.getElementById("leaderboard").style.display="none";
}

// LOOP
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(playing){
  time++;

  // ⚡ ускорение каждые ~2 сек
  if(time%120==0){
   speed+=0.5;
  }

  player.update();
  player.draw();

  obstacles.forEach(o=>{
   o.update();
   o.draw();

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.gap){
     triggerGameOver();
    }
   }

   if(o.y>canvas.height){
    score++;
   }
  });

  obstacles=obstacles.filter(o=>o.y<canvas.height);
 }

 requestAnimationFrame(loop);
}

// SPAWN
setInterval(()=>{
 if(playing)obstacles.push(new Obstacle());
},900);

// INPUT
canvas.addEventListener("mousedown",input);
canvas.addEventListener("touchstart",input);

function input(){
 if(gameOverState){
  document.getElementById("gameOver").style.display="none";
  startGame();
 }else if(playing){
  player.move();
 }
}

loop();
</script>

</body>
</html>
