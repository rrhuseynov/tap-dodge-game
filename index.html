<!-- index.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Dodge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="welcome" class="screen active">
  <img src="assets/welcome.png" class="bg">
</div>

<div id="menu" class="screen">
  <img src="assets/main_menu.PNG" class="bg">

  <div class="menu">
    <img src="assets/start.png" id="startBtn">
    <img src="assets/shop.png" id="shopBtn">
    <img src="assets/appearance.png" id="appearanceBtn">
    <img src="assets/leaderboard.png" id="leaderboardBtn">
  </div>
</div>

<div id="game" class="screen">
  <img src="assets/game_bg.png" class="bg">
  <canvas id="gameCanvas"></canvas>
</div>

<div id="shop" class="screen">
  <img src="assets/shop_bg.png" class="bg">

  <div class="shop">

    <div class="row">
      <img src="assets/bag.png">
      <img src="assets/price-100.png">
    </div>

    <div class="row">
      <img src="assets/chest.png">
      <img src="assets/price-700.png">
    </div>

    <div class="row">
      <img src="assets/chest_gems.png">
      <img src="assets/price-900.png">
    </div>

  </div>

  <div id="backBtn">BACK</div>
</div>

<script src="game.js"></script>
</body>
</html>
