<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Dodge Clean</title>

<style>
html, body{
 margin:0;
 padding:0;
 overflow:hidden;
 font-family:Arial;
 background:#020617;
}

#menu{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 color:#22c55e;
 font-size:30px;
 z-index:2;
}

#top{
 position:absolute;
 top:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:10px;
 color:#fff;
 display:none;
}
</style>
</head>

<body>

<div id="menu">TAP TO START</div>

<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<canvas id="game"></canvas>

<script>
// CANVAS
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ===== PLAYER CLASS =====
class Player {
 constructor(){
  this.x = canvas.width/2;
  this.targetX = this.x;
  this.y = canvas.height - 120;
 }

 update(){
  this.x += (this.targetX - this.x) * 0.2;
 }

 draw(){
  ctx.fillStyle="#22c55e";
  ctx.beginPath();
  ctx.arc(this.x,this.y,10,0,Math.PI*2);
  ctx.fill();
 }

 switchSide(){
  this.targetX = this.targetX < canvas.width/2
   ? canvas.width*0.75
   : canvas.width*0.25;
 }
}

// ===== OBSTACLE CLASS =====
class Obstacle {
 constructor(){
  this.gap = 120;
  this.x = Math.random() * (canvas.width - this.gap);
  this.y = -30;
 }

 update(speed){
  this.y += speed;
 }

 draw(){
  ctx.fillStyle="#ef4444";
  ctx.fillRect(0,this.y,this.x,20);
  ctx.fillRect(this.x+this.gap,this.y,canvas.width-(this.x+this.gap),20);
 }
}

// ===== GAME CLASS =====
class Game {
 constructor(){
  this.player = new Player();
  this.obstacles = [];
  this.score = 0;
  this.best = localStorage.getItem("best") || 0;
  this.speed = 4;
  this.playing = false;

  document.getElementById("best").innerText = this.best;
 }

 start(){
  this.playing = true;
  this.score = 0;
  this.speed = 4;
  this.obstacles = [];
  this.player = new Player();

  document.getElementById("menu").style.display="none";
  document.getElementById("top").style.display="flex";
  document.getElementById("score").innerText = this.score;
 }

 spawn(){
  this.obstacles.push(new Obstacle());
 }

 update(){
  ctx.fillStyle="rgba(2,6,23,0.4)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  this.player.update();
  this.player.draw();

  if(this.playing){
   this.obstacles.forEach(o=>{
    o.update(this.speed);
    o.draw();

    // collision
    if(this.player.y < o.y+20 && this.player.y > o.y){
     if(this.player.x < o.x || this.player.x > o.x+o.gap){
      this.gameOver();
     }
    }

    // passed
    if(o.y > canvas.height){
     this.score++;
     this.speed += 0.1;
     document.getElementById("score").innerText = this.score;
    }
   });

   this.obstacles = this.obstacles.filter(o=>o.y < canvas.height);
  }
 }

 gameOver(){
  this.playing = false;

  if(this.score > this.best){
   this.best = this.score;
   localStorage.setItem("best", this.best);
  }

  document.getElementById("menu").innerText="GAME OVER\nTAP TO RESTART";
  document.getElementById("menu").style.display="flex";
  document.getElementById("top").style.display="none";
 }
}

// INIT GAME
const game = new Game();

// INPUT
canvas.addEventListener("touchstart", handleTap);
canvas.addEventListener("mousedown", handleTap);

function handleTap(){
 if(!game.playing){
  game.start();
 } else {
  game.player.switchSide();
 }
}

// LOOP
function loop(){
 game.update();
 requestAnimationFrame(loop);
}

// SPAWN LOOP
setInterval(()=>{
 if(game.playing) game.spawn();
}, 1000);

loop();
</script>

</body>
</html>
