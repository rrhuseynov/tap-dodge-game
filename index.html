<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap & Dodge</title>

<style>
html,body{
 margin:0;
 padding:0;
 background:#000;
 font-family:Arial;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 color:white;
}

/* MAIN LAYOUT */
#wrapper{
 display:flex;
 align-items:center;
 gap:20px;
}

/* SIDE PANELS */
.panel{
 background:#111;
 padding:15px;
 border-radius:15px;
 width:100px;
 text-align:center;
 box-shadow:0 0 15px rgba(255,255,255,0.1);
}

.panel div{
 margin:10px 0;
}

/* GAME WINDOW */
#gameBox{
 position:relative;
 border-radius:20px;
 overflow:hidden;
 box-shadow:0 0 30px rgba(0,0,0,0.8);
}

/* CANVAS */
canvas{
 display:block;
 background:#020617;
}

/* GAME OVER */
#gameOver{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 background:rgba(0,0,0,0.7);
 opacity:0;
 pointer-events:none;
 transition:0.3s;
}

#gameOver.show{
 opacity:1;
 pointer-events:auto;
}

#gameOver h1{
 color:#ff4444;
}
</style>
</head>

<body>

<div id="wrapper">

 <!-- LEFT -->
 <div class="panel">
  <div>Score</div>
  <div id="score">0</div>
 </div>

 <!-- GAME -->
 <div id="gameBox">
  <canvas id="game" width="300" height="500"></canvas>

  <div id="gameOver">
   <h1>GAME OVER</h1>
   <p>Tap to restart</p>
  </div>
 </div>

 <!-- RIGHT -->
 <div class="panel">
  <div>Time</div>
  <div id="time">0</div>

  <div>Speed</div>
  <div id="speed">0</div>
 </div>

</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let player,obstacles,playing,gameOverState;
let score,time,speed;

// PLAYER
class Player{
 constructor(){
  this.x=canvas.width/2;
  this.targetX=this.x;
  this.y=canvas.height-80;
 }

 update(){
  this.x+=(this.targetX-this.x)*0.2;
 }

 draw(){
  let g=ctx.createRadialGradient(this.x,this.y,2,this.x,this.y,12);
  g.addColorStop(0,"#a7f3d0");
  g.addColorStop(1,"#22c55e");

  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(this.x,this.y,12,0,Math.PI*2);
  ctx.fill();
 }

 move(){
  this.targetX=this.targetX<canvas.width/2
   ?canvas.width*0.75
   :canvas.width*0.25;
 }
}

// OBSTACLE
class Obstacle{
 constructor(){
  this.gap=160;
  this.x=Math.random()*(canvas.width-this.gap);
  this.y=-30;
 }

 update(){this.y+=speed;}

 draw(){
  let g=ctx.createLinearGradient(0,this.y,0,this.y+20);
  g.addColorStop(0,"#ff7a00");
  g.addColorStop(1,"#ff0055");

  ctx.fillStyle=g;
  ctx.fillRect(0,this.y,this.x,20);
  ctx.fillRect(this.x+this.gap,this.y,
   canvas.width-(this.x+this.gap),20);
 }
}

// START
function startGame(){
 player=new Player();
 obstacles=[];
 score=0;
 time=0;
 speed=3;
 playing=true;
 gameOverState=false;

 document.getElementById("gameOver").classList.remove("show");
}

// GAME OVER
function triggerGameOver(){
 playing=false;
 gameOverState=true;
 document.getElementById("gameOver").classList.add("show");
}

// LOOP
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(playing){
  time++;

  if(time%120===0){
   speed+=0.3;
  }

  player.update();
  player.draw();

  obstacles.forEach(o=>{
   o.update();
   o.draw();

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.gap){
     triggerGameOver();
    }
   }

   if(o.y>canvas.height){
    score++;
   }
  });

  obstacles=obstacles.filter(o=>o.y<canvas.height);

  // UI update
  document.getElementById("score").innerText=score;
  document.getElementById("time").innerText=(time/60).toFixed(1);
  document.getElementById("speed").innerText=speed.toFixed(1);
 }

 requestAnimationFrame(loop);
}

// SPAWN
setInterval(()=>{
 if(playing) obstacles.push(new Obstacle());
},900);

// INPUT
canvas.addEventListener("mousedown",input);
canvas.addEventListener("touchstart",input);

function input(){
 if(gameOverState){
  startGame();
 }else{
  player.move();
 }
}

// INIT
startGame();
loop();
</script>

</body>
</html>
