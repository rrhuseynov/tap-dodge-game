<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tap Dodge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <img src="assets/welcome.png" class="bg">
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <img src="assets/main_menu.png" class="bg">

  <div class="click start" onclick="show('game_start')"></div>
  <div class="click shop" onclick="show('shop')"></div>
  <div class="click appearance" onclick="show('appearance_ball')"></div>
  <div class="click leaderboard" onclick="show('leaderboard')"></div>
</div>

<!-- GAME START -->
<div id="game_start" class="screen">
  <img src="assets/game_start.png" class="bg">
  <div class="full" onclick="show('game')"></div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <img src="assets/game.png" class="bg">

  <!-- CONTINUE OVERLAY -->
  <div id="continueBox" class="overlay hidden">
    <img src="assets/continue.png" class="popup">
    <div class="full" onclick="hideContinue()"></div>
  </div>

</div>

<!-- SHOP -->
<div id="shop" class="screen">
  <img src="assets/shop.png" class="bg">
  <div class="back" onclick="show('menu')"></div>
</div>

<!-- APPEARANCE BALL -->
<div id="appearance_ball" class="screen">
  <img src="assets/appearance-ball.png" class="bg">
  <div class="back" onclick="show('menu')"></div>
</div>

<!-- APPEARANCE BG -->
<div id="appearance_bg" class="screen">
  <img src="assets/appearance-bg.png" class="bg">
  <div class="back" onclick="show('menu')"></div>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="screen">
  <img src="assets/leaderboard.png" class="bg">
  <div class="back" onclick="show('menu')"></div>
</div>

<script src="game.js"></script>
</body>
</html>
