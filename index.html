<div id="game" class="screen">
  <img src="assets/game_start.png" class="bg">

  <!-- UI -->
  <div class="top-ui">

    <div class="score-box">
      <div class="label">SCORE</div>
      <div id="scoreText">0</div>
    </div>

    <div class="level-box">
      LEVEL 1
      <div class="bar">
        <div id="progress"></div>
      </div>
    </div>

    <div class="best-box">
      <div class="label">BEST</div>
      <div id="bestText">0</div>
    </div>

  </div>

  <!-- hearts -->
  <div id="livesText" class="hearts">❤️❤️❤️</div>

  <!-- coins -->
  <div class="coins">
    🪙 <span id="coinText">120</span>
  </div>

  <!-- game -->
  <canvas id="gameCanvas"></canvas>
</div>
