<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap & Dodge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
    <img src="assets/main_menu.PNG" class="bg">

    <div class="menu">
        <img src="assets/start.png" id="startBtn" class="menu-btn">
        <img src="assets/shop.png" id="shopBtn" class="menu-btn">
        <img src="assets/appearance.png" id="appearanceBtn" class="menu-btn">
        <img src="assets/leaderboard.png" id="leaderboardBtn" class="menu-btn">
    </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
    <img src="assets/game_start.png" class="bg">
    <canvas id="gameCanvas"></canvas>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
    <img src="assets/shop.PNG" class="bg">

    <div class="shop">
        <div class="row">
            <img src="assets/bag.png">
            <img src="assets/price-100.png">
        </div>

        <div class="row">
            <img src="assets/chest.png">
            <img src="assets/price-300.png">
        </div>

        <div class="row">
            <img src="assets/chest_gems.png">
            <img src="assets/price-500.png">
        </div>
    </div>

    <div id="backBtn" class="back-btn">BACK</div>
</div>

<script src="game.js"></script>

</body>
</html>
