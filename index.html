<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Tap Dodge</title>

<link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- WELCOME -->
<div id="welcome" class="screen active">
  <img src="assets/welcome.png" class="bg">
</div>

<!-- MENU -->
<div id="menu" class="screen">
  <img src="assets/main_menu.PNG" class="bg">

  <div class="menu-buttons">
    <button onclick="goGameStart()">START</button>
    <button onclick="show('shop')">SHOP</button>
    <button onclick="show('appearance_ball')">APPEARANCE</button>
    <button onclick="show('leaderboard')">LEADERBOARD</button>
  </div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
  <img src="assets/shop.PNG" class="bg">

  <div class="shop-items" id="shopItems"></div>
</div>

<!-- GAME START -->
<div id="game_start" class="screen">
  <img src="assets/game_start.png" class="bg">
  <div class="tap-area" onclick="startGameNow()"></div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <img src="assets/game_start.png" class="bg">
  <canvas id="gameCanvas"></canvas>
</div>

<script src="./game.js"></script>

</body>
</html>
