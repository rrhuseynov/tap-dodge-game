<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Dodge Cyber</title>

<style>
html, body{
 margin:0;
 padding:0;
 overflow:hidden;
 font-family:Arial;
}

/* CYBERPUNK BACKGROUND */
body{
 background: url("https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1600") no-repeat center;
 background-size: cover;
}

/* GRADIENT OVERLAY */
#overlay{
 position:absolute;
 width:100%;
 height:100%;
 background:linear-gradient(180deg,rgba(0,0,0,0.7),rgba(2,6,23,0.9));
}

/* LIGHT GLOW */
.glow{
 position:absolute;
 width:300px;
 height:300px;
 background:radial-gradient(circle, rgba(34,197,94,0.3), transparent);
 border-radius:50%;
 animation:move 10s infinite alternate;
}

@keyframes move{
 from{transform:translate(-50px,-50px);}
 to{transform:translate(50px,50px);}
}

/* MENU */
#menu{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 z-index:2;
}

/* GLASS PANEL */
.panel{
 padding:30px;
 border-radius:20px;
 background:rgba(255,255,255,0.05);
 backdrop-filter:blur(15px);
 border:1px solid rgba(255,255,255,0.1);
 text-align:center;
}

/* TITLE */
.title{
 font-size:40px;
 color:#22c55e;
 text-shadow:0 0 25px #22c55e;
 margin-bottom:20px;
}

/* BUTTONS */
.btn{
 width:200px;
 padding:14px;
 margin:10px;
 font-size:18px;
 border:none;
 border-radius:12px;
 background:rgba(34,197,94,0.2);
 color:#22c55e;
 border:1px solid #22c55e;
 transition:0.2s;
}

.btn:active{
 transform:scale(0.95);
 background:#22c55e;
 color:#000;
}

/* TOP UI */
#top{
 position:absolute;
 top:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:10px;
 color:#fff;
 display:none;
 z-index:3;
}

canvas{
 position:absolute;
 z-index:1;
}
</style>
</head>

<body>

<div id="overlay"></div>
<div class="glow" style="top:20%; left:30%;"></div>
<div class="glow" style="top:60%; left:70%;"></div>

<div id="menu">
 <div class="panel">
  <div class="title">TAP DODGE</div>
  <button class="btn" onclick="startGame()">NEW GAME</button>
  <button class="btn" onclick="startCrazy()">CRAZY MODE</button>
 </div>
</div>

<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width = innerWidth;
 canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

// GAME STATE
let player, obstacles, score, best, speed, playing;

// PLAYER
class Player{
 constructor(){
  this.x = canvas.width/2;
  this.targetX = this.x;
  this.y = canvas.height-120;
 }

 update(){
  this.x += (this.targetX-this.x)*0.2;
 }

 draw(){
  ctx.shadowBlur=20;
  ctx.shadowColor="#22c55e";

  ctx.fillStyle="#22c55e";
  ctx.beginPath();
  ctx.arc(this.x,this.y,10,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur=0;
 }

 move(){
  this.targetX = this.targetX < canvas.width/2
   ? canvas.width*0.75
   : canvas.width*0.25;
 }
}

// OBSTACLE
class Obstacle{
 constructor(){
  this.gap=120;
  this.x=Math.random()*(canvas.width-this.gap);
  this.y=-30;
 }

 update(){ this.y+=speed; }

 draw(){
  ctx.fillStyle="#ff0055";
  ctx.fillRect(0,this.y,this.x,20);
  ctx.fillRect(this.x+this.gap,this.y,canvas.width-(this.x+this.gap),20);
 }
}

// INIT
function init(){
 player=new Player();
 obstacles=[];
 score=0;
 speed=4;
 best=localStorage.getItem("best")||0;
 playing=true;

 document.getElementById("score").innerText=score;
 document.getElementById("best").innerText=best;
}

// START
function startGame(){
 init();
 document.getElementById("menu").style.display="none";
 document.getElementById("top").style.display="flex";
}

function startCrazy(){
 init();
 speed=7;
 document.getElementById("menu").style.display="none";
 document.getElementById("top").style.display="flex";
}

// GAME OVER
function gameOver(){
 playing=false;

 if(score>best){
  best=score;
  localStorage.setItem("best",best);
 }

 document.getElementById("menu").style.display="flex";
 document.getElementById("top").style.display="none";
}

// LOOP
function loop(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(playing){
  player.update();
  player.draw();

  obstacles.forEach(o=>{
   o.update();
   o.draw();

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.gap){
     gameOver();
    }
   }

   if(o.y>canvas.height){
    score++;
    speed+=0.1;
    document.getElementById("score").innerText=score;
   }
  });

  obstacles = obstacles.filter(o=>o.y<canvas.height);
 }

 requestAnimationFrame(loop);
}

// SPAWN
setInterval(()=>{
 if(playing) obstacles.push(new Obstacle());
},1000);

// INPUT
canvas.addEventListener("touchstart",()=>player?.move());
canvas.addEventListener("mousedown",()=>player?.move());

loop();
</script>

</body>
</html>
