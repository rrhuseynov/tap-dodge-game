<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Dodge</title>

<style>
html, body{
 margin:0;
 padding:0;
 overflow:hidden;
 font-family:Arial;
 background:#020617;
}

/* LOADING SCREEN */
#loading{
 position:absolute;
 width:100%;
 height:100%;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 background:#020617;
 color:#22c55e;
 font-size:28px;
 z-index:5;
}

#bar{
 width:200px;
 height:6px;
 background:#111;
 margin-top:20px;
 border-radius:10px;
 overflow:hidden;
}

#progress{
 width:0%;
 height:100%;
 background:#22c55e;
}

/* GAME UI */
#top{
 position:absolute;
 top:0;
 width:100%;
 display:flex;
 justify-content:space-between;
 padding:12px 15px;
 color:#fff;
 backdrop-filter: blur(10px);
 background:rgba(0,0,0,0.3);
 z-index:2;
}

#menu{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 color:#22c55e;
 font-size:28px;
 text-align:center;
 z-index:2;
}

canvas{
 position:absolute;
 top:0;
 left:0;
}
</style>
</head>

<body>

<div id="loading">
 <div>LOADING...</div>
 <div id="bar"><div id="progress"></div></div>
</div>

<div id="top">
 <div>Score: <span id="score">0</span></div>
 <div>Best: <span id="best">0</span></div>
</div>

<div id="menu">TAP TO START</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
 canvas.width = window.innerWidth;
 canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// LOADING ANIMATION
let progress = 0;
let loadInterval = setInterval(()=>{
 progress += 5;
 document.getElementById("progress").style.width = progress + "%";

 if(progress >= 100){
  clearInterval(loadInterval);
  document.getElementById("loading").style.display = "none";
 }
}, 80);

// STARS
let stars=[];
for(let i=0;i<60;i++){
 stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

// PLAYER
let player={x:0,targetX:0,y:0};

// STATE
let obstacles=[];
let score=0;
let best=localStorage.getItem("best")||0;
let speed=4;
let playing=false;

document.getElementById("best").innerText=best;

function resetPlayer(){
 player.x=canvas.width/2;
 player.targetX=canvas.width/2;
 player.y=canvas.height-120;
}

// SPAWN
function spawn(){
 let gap=120;
 let x=Math.random()*(canvas.width-gap);
 obstacles.push({x,width:gap,y:-30});
}

// DRAW
function drawStars(){
 ctx.fillStyle="#fff";
 stars.forEach(s=>{
  ctx.fillRect(s.x,s.y,2,2);
  s.y+=1;
  if(s.y>canvas.height)s.y=0;
 });
}

function drawPlayer(){
 player.x += (player.targetX-player.x)*0.2;

 ctx.fillStyle="#22c55e";
 ctx.beginPath();
 ctx.arc(player.x,player.y,10,0,Math.PI*2);
 ctx.fill();
}

function drawObstacles(){
 ctx.fillStyle="#ef4444";
 obstacles.forEach(o=>{
  ctx.fillRect(0,o.y,o.x,20);
  ctx.fillRect(o.x+o.width,o.y,canvas.width-(o.x+o.width),20);
 });
}

// GAME OVER
function gameOver(){
 playing=false;

 if(score>best){
  best=score;
  localStorage.setItem("best",best);
 }

 document.getElementById("menu").innerText="GAME OVER\nTAP TO RESTART";
 document.getElementById("menu").style.display="block";
}

// UPDATE
function update(){
 ctx.fillStyle="rgba(2,6,23,0.4)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 drawStars();
 drawPlayer();
 drawObstacles();

 if(playing){
  obstacles.forEach(o=>{
   o.y+=speed;

   if(player.y<o.y+20 && player.y>o.y){
    if(player.x<o.x || player.x>o.x+o.width){
     gameOver();
    }
   }

   if(o.y>canvas.height){
    score++;
    speed+=0.1;
    document.getElementById("score").innerText=score;
   }
  });

  obstacles=obstacles.filter(o=>o.y<canvas.height);
 }

 requestAnimationFrame(update);
}

// TAP
function tap(){
 if(!playing){
  startGame();
  return;
 }

 player.targetX = player.targetX < canvas.width/2
  ? canvas.width*0.75
  : canvas.width*0.25;
}

// START
function startGame(){
 playing=true;
 score=0;
 speed=4;
 obstacles=[];

 resetPlayer();

 document.getElementById("score").innerText=score;
 document.getElementById("menu").style.display="none";
}

// EVENTS
canvas.addEventListener("touchstart",tap);
canvas.addEventListener("mousedown",tap);

setInterval(()=>{ if(playing) spawn(); },1000);

resetPlayer();
update();
</script>

</body>
</html>
