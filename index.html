<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dodge Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen active">
    <img src="assets/main_menu.PNG" class="bg">

    <div class="menu">
        <img src="assets/start.png" id="startBtn" class="menu-btn">
        <img src="assets/shop.png" id="shopBtn" class="menu-btn">
        <img src="assets/appearance.png" id="appearanceBtn" class="menu-btn">
        <img src="assets/leaderboard.png" id="leaderboardBtn" class="menu-btn">
    </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
    <img src="assets/game_start.png" class="bg">
    <canvas id="gameCanvas"></canvas>
</div>

<script src="game.js"></script>
</body>
</html>
